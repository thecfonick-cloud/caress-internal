<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Caress Internal</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f4f7fb;
      color: #1f2937;
    }

    .hidden {
      display: none;
    }

    .auth-wrapper,
    .dashboard-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 430px;
      background: #ffffff;
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
    }

    .card h1 {
      font-size: 28px;
      margin-bottom: 8px;
      color: #0f172a;
    }

    .card p {
      color: #64748b;
      margin-bottom: 20px;
    }

    .brand {
      color: #2563eb;
      font-weight: 700;
      margin-bottom: 18px;
      font-size: 22px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      margin-top: 14px;
      font-size: 14px;
      color: #334155;
      font-weight: 600;
    }

    input,
    select,
    textarea,
    button {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid #dbe1ea;
      font-size: 14px;
    }

    textarea {
      min-height: 110px;
      resize: vertical;
    }

    input:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: #2563eb;
    }

    .btn {
      background: #2563eb;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: 700;
      margin-top: 16px;
    }

    .btn:hover {
      background: #1d4ed8;
    }

    .btn-secondary {
      background: #e2e8f0;
      color: #0f172a;
      margin-top: 10px;
    }

    .btn-secondary:hover {
      background: #cbd5e1;
    }

    .topbar {
      background: #0f172a;
      color: white;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .topbar h2 {
      font-size: 22px;
    }

    .dashboard {
      max-width: 1100px;
      margin: 24px auto;
      padding: 0 16px 24px;
    }

    .welcome {
      background: white;
      border-radius: 16px;
      padding: 22px;
      margin-bottom: 20px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.06);
    }

    .welcome h3 {
      margin-bottom: 6px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 20px;
    }

    .stat-card {
      background: white;
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.06);
    }

    .stat-card h4 {
      color: #64748b;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .stat-card p {
      font-size: 26px;
      font-weight: 700;
      color: #0f172a;
    }

    .section {
      background: white;
      border-radius: 16px;
      padding: 22px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.06);
      margin-bottom: 20px;
    }

    .section h3 {
      margin-bottom: 16px;
      color: #0f172a;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 16px;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    table th,
    table td {
      padding: 12px;
      border-bottom: 1px solid #e5e7eb;
      text-align: left;
      font-size: 14px;
    }
